[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/healthcheck.php"

[env]
HOTEL_STORAGE_MODE = "volatile"
HOTEL_DEMO_VOLATILE = "true"
HOTEL_DEMO_SESSION_ONLY = "false"
HOTEL_DEMO_COOKIE_MIRROR = "false"
HOTEL_SESSION_SAVE_PATH = "/tmp/hotel_sessions"
PORT = "80"
RAILWAY_HEALTHCHECK_TIMEOUT_SEC = "120"